<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hotspot Sesilia</title>

$(if chap-id)
<form name="sendin" action="$(link-login-only)" method="post" style="display:none">
  <input type="hidden" name="username" />
  <input type="hidden" name="password" />
  <input type="hidden" name="dst" value="$(link-orig)" />
  <input type="hidden" name="popup" value="true" />
</form>
<script src="/md5.js"></script>
<script>
function doLogin() {
  document.sendin.username.value = document.login.username.value;
  document.sendin.password.value =
    hexMD5('$(chap-id)' + document.login.password.value + '$(chap-challenge)');
  document.sendin.submit();
  return false;
}
</script>
$(endif)

<style>
/* BODY */
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial, sans-serif;
  background: #6dd5fa;
  overflow: hidden;
  position: relative;
}

/* BUBBLE ANIMASI */
.bubble {
  position: absolute;
  bottom: -100px;
  width: 40px;
  height: 40px;
  background: rgba(255,255,255,0.6);
  border-radius: 50%;
  animation: rise 10s infinite ease-in;
}

@keyframes rise {
  0% { transform: translateY(0) scale(1); opacity: 0.7; }
  50% { opacity: 0.4; }
  100% { transform: translateY(-120vh) scale(1.5); opacity: 0; }
}

/* BOX LOGIN */
.container {
  width: 90%;
  max-width: 350px;
  background: rgba(255,255,255,0.2);
  padding: 25px;
  border-radius: 15px;
  backdrop-filter: blur(10px);
  text-align: center;
  z-index: 10;
  position: relative;
}

/* TITLE */
h2 {
  margin-bottom: 20px;
  color: #fff;
  text-shadow: 0 0 10px #00e5ff;
}

/* INPUT */
input[type="text"], input[type="password"] {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border: none;
  border-radius: 8px;
  outline: none;
}

/* SUBMIT */
input[type="submit"] {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: none;
  border-radius: 8px;
  background: #00e5ff;
  color: black;
  font-weight: bold;
  cursor: pointer;
}

input[type="submit"]:hover {
  background: #00bcd4;
}

/* ERROR */
.error {
  color: #ff4444;
  font-size: 13px;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<!-- GELEMBUNG -->
<div class="bubble" style="left:5%; width:20px; height:20px; animation-duration:12s;"></div>
<div class="bubble" style="left:15%; width:30px; height:30px; animation-duration:10s;"></div>
<div class="bubble" style="left:25%; width:25px; height:25px; animation-duration:14s;"></div>
<div class="bubble" style="left:50%; width:40px; height:40px; animation-duration:18s;"></div>
<div class="bubble" style="left:70%; width:35px; height:35px; animation-duration:12s;"></div>
<div class="bubble" style="left:85%; width:20px; height:20px; animation-duration:16s;"></div>

<div class="container">
  <h2>Selamat Datang di Hotspot Sesilia</h2>

  $(if error)
  <div class="error">$(error)</div>
  $(endif)

  <form name="login" action="$(link-login-only)" method="post"
        $(if chap-id) onsubmit="return doLogin()" $(endif)>

    <input type="hidden" name="dst" value="$(link-orig)">
    <input type="hidden" name="popup" value="true">

    <input name="username" type="text" placeholder="Username" value="$(username)">
    <input name="password" type="password" placeholder="Password">

    <input type="submit" value="Login">
  </form>
</div>

<script>
document.login.username.focus();
</script>
</body>
</html>
